<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Provider limits &amp; utilization — uniinfer</title>
    <style>
      :root {
        --bg: #0f172a; --card: #1e293b; --ink: #e2e8f0; --dim: #94a3b8;
        --line: #334155; --accent: #38bdf8; --ok: #22c55e; --warn: #f59e0b; --bad: #ef4444;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--ink);
             font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      header { padding: 18px 24px; border-bottom: 1px solid var(--line);
               display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
      h1 { font-size: 18px; margin: 0; font-weight: 600; }
      .meta { color: var(--dim); font-size: 12px; }
      button { background: var(--card); color: var(--ink); border: 1px solid var(--line);
               border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
      button:hover { border-color: var(--accent); }
      main { padding: 20px 24px; display: grid; gap: 14px;
             grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); }
      .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
      .card h2 { margin: 0 0 2px; font-size: 15px; }
      .card .notes { color: var(--dim); font-size: 12px; margin: 0 0 10px; }
      .badge { display: inline-block; background: #082f49; color: var(--accent);
               border-radius: 999px; padding: 1px 8px; font-size: 11px; margin-left: 6px; }
      .util { margin: 8px 0; }
      .util .lbl { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
      .util .lbl .pct { color: var(--dim); }
      .bar { height: 8px; background: #0b1220; border-radius: 999px; overflow: hidden; }
      .bar > span { display: block; height: 100%; border-radius: 999px; transition: width .4s; }
      .limits { margin-top: 10px; font-size: 12px; color: var(--dim); }
      .limits span { display: inline-block; background: #0b1220; border: 1px solid var(--line);
                     border-radius: 5px; padding: 1px 6px; margin: 2px 4px 2px 0; color: var(--ink); }
      a.src { color: var(--accent); font-size: 11px; text-decoration: none; }
      .empty { color: var(--dim); padding: 40px; text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <h1>Provider limits &amp; utilization</h1>
      <span class="meta" id="meta">loading…</span>
      <button onclick="load()">refresh</button>
      <label class="meta"><input type="checkbox" id="auto" onchange="toggleAuto()" /> auto 30s</label>
    </header>
    <main id="cards"></main>

    <script>
      const METRIC_LABEL = {
        requests_per_minute: "req/min", requests_per_day: "req/day",
        requests_per_month: "req/month", requests_per_hour: "req/hr",
        tokens_per_minute: "tok/min", tokens_per_day: "tok/day",
        tokens_per_month: "tok/month",
      };
      let timer = null;

      function color(pct) {
        return pct >= 90 ? "var(--bad)" : pct >= 70 ? "var(--warn)" : "var(--ok)";
      }
      function fmt(n) {
        n = Number(n) || 0;
        return n >= 1000 ? (n / 1000).toFixed(n >= 100000 ? 0 : 1) + "k" : String(n);
      }

      async function load() {
        const meta = document.getElementById("meta");
        const root = document.getElementById("cards");
        meta.textContent = "loading…";
        try {
          const res = await fetch("/v1/system/provider-limits");
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();
          meta.textContent = "generated " + (data.generated_at || "?");
          render(data.providers || {});
        } catch (e) {
          meta.textContent = "error: " + e.message;
          root.innerHTML = '<div class="empty">Could not load /v1/system/provider-limits — '
                         + 'is the proxy running and this endpoint registered?</div>';
        }
      }

      function render(providers) {
        const root = document.getElementById("cards");
        const ids = Object.keys(providers).sort();
        if (!ids.length) { root.innerHTML = '<div class="empty">No provider limits configured.</div>'; return; }
        root.innerHTML = ids.map(pid => card(pid, providers[pid])).join("");
      }

      function card(pid, p) {
        const lim = p.limits || {};
        const util = p.utilization || [];
        const bars = util.map(u => {
          const pct = Math.min(u.pct, 100);
          const note = u.approximate ? ' <span style="color:var(--dim)">~</span>' : "";
          return `<div class="util">
            <div class="lbl"><span>${METRIC_LABEL[u.metric] || u.metric}${note}</span>
              <span class="pct">${fmt(u.used)} / ${fmt(u.limit)} · ${u.pct}%</span></div>
            <div class="bar"><span style="width:${pct}%;background:${color(u.pct)}"></span></div>
          </div>`;
        }).join("");

        // limits without a utilization row (concurrent, unlimited, etc.)
        const utilMetrics = new Set(util.map(u => u.metric));
        const extra = Object.keys(lim)
          .filter(k => !utilMetrics.has(k) && !["notes", "source", "per_model"].includes(k))
          .map(k => `<span>${METRIC_LABEL[k] || k}: ${lim.unlimited ? "∞" : fmt(lim[k])}</span>`).join("");
        const unlimited = lim.unlimited ? '<span class="badge">unlimited</span>' : "";
        const src = lim.source ? `<a class="src" href="${lim.source}" target="_blank">source ↗</a>` : "";

        return `<div class="card">
          <h2>${pid}${unlimited}</h2>
          <p class="notes">${lim.notes || ""}</p>
          ${bars || '<div class="notes">no usage-mapped limits</div>'}
          ${extra ? `<div class="limits">${extra}</div>` : ""}
          <div style="margin-top:8px">${src}</div>
        </div>`;
      }

      function toggleAuto() {
        if (document.getElementById("auto").checked) {
          timer = setInterval(load, 30000);
        } else if (timer) {
          clearInterval(timer); timer = null;
        }
      }

      load();
    </script>
  </body>
</html>
