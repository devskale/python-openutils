<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniInfer | Unified AI Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <link rel="stylesheet" href="/webdemo/style.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>UniInfer</h1>
      <div id="app-version" class="version-badge">v...</div>
      <div class="mode-switch">
        <button id="mode-chat" class="mode-btn active">Chat</button>
        <button id="mode-models" class="mode-btn">Models</button>
        <button id="mode-image" class="mode-btn">Images</button>
        <button id="mode-audio" class="mode-btn">Audio</button>
      </div>
      <div id="chat-stats" class="stats-bar">
        <span id="stats-text">0 msgs</span>
        <button id="clear-chat-btn" class="stats-clear-btn" title="Clear chat">✕</button>
      </div>
      <button id="settings-button" class="icon-btn-lg" title="Settings">⚙️</button>
    </header>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
      <div class="modal-content">
        <h2>Settings</h2>
        <div class="form-group">
          <label>API Base URL</label>
          <input type="text" id="settings-api-base-url" placeholder="https://api.example.com/v1" />
        </div>
        <div class="form-group">
          <label>API Key</label>
          <input type="password" id="settings-api-key" placeholder="Bearer token" />
        </div>
        <div class="form-group">
          <label class="checkbox-label"><input type="checkbox" id="settings-remember-key" /> Remember key on this device</label>
          <div class="form-hint">Stored browser keys can be read by scripts on this page.</div>
        </div>
        <div class="form-group">
          <label>Max Tokens</label>
          <input type="number" id="settings-max-tokens" value="4000" />
        </div>
        <div class="modal-actions">
          <button id="settings-save" class="btn-primary">Save</button>
          <button id="settings-cancel" class="btn-secondary">Cancel</button>
        </div>
        <div class="modal-footer">
          <button id="update-models-btn" class="btn-link">⟳ Refresh Models</button>
          <div id="update-models-status" class="form-hint"></div>
        </div>
      </div>
    </div>

    <!-- Chat Section -->
    <div id="chat-section" class="section">
      <div id="model-select-bar">
        <div class="select-group">
          <label>Provider</label>
          <select id="provider-select" disabled><option>Loading...</option></select>
        </div>
        <div class="select-group select-group--model">
          <label>Model</label>
          <div class="model-select-wrapper">
            <div class="search-input-wrap"><input type="text" id="model-search" placeholder="Search models..." autocomplete="off" /><button class="search-clear" data-target="model-search" style="display:none">×</button></div>
            <div id="model-dropdown" class="model-dropdown"></div>
          </div>
          <button id="selected-model-info" class="model-info-btn" title="Model details" style="display:none">ⓘ</button>
        </div>
      </div>

      <!-- Model info bar (shows when a model is selected) -->
      <div id="model-info-bar" class="model-info-bar" style="display:none">
        <span id="model-info-type" class="model-tag"></span>
        <span id="model-info-ctx" class="model-meta"></span>
        <span id="model-info-cost" class="model-meta"></span>
        <span id="model-info-caps" class="model-meta"></span>
        <span id="model-info-status" class="model-meta"></span>
      </div>

      <div id="chat-container">
        <div class="system-message">Select a provider and model to start chatting.</div>
      </div>

      <div id="chat-input-wrapper">
        <div id="image-preview-area" style="display:none">
          <div style="position:relative">
            <img id="image-preview-img" class="preview-thumb" />
            <button id="remove-image-btn" class="remove-preview-btn">×</button>
          </div>
        </div>
        <div id="input-area">
          <button id="upload-image-btn" class="icon-btn" title="Upload Image">📷</button>
          <input type="file" id="chat-file-input" accept="image/*" style="display:none" />
          <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
          <button id="send-button" title="Send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
          </button>
          <button id="stop-button" title="Stop" style="display:none">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Models Browser Section -->
    <div id="models-section" class="section" style="display:none">
      <div class="models-toolbar">
        <div class="models-search">
          <div class="search-input-wrap"><input type="text" id="models-browser-search" placeholder="Search models..." /><button class="search-clear" data-target="models-browser-search" style="display:none">×</button></div>
        </div>
        <div class="models-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="chat">Chat</button>
          <button class="filter-btn" data-filter="embed">Embed</button>
          <button class="filter-btn" data-filter="tts">TTS</button>
          <button class="filter-btn" data-filter="stt">STT</button>
          <button class="filter-btn" data-filter="image">Image</button>
        </div>
        <div class="models-provider-filter">
          <select id="models-browser-provider"><option value="">All providers</option></select>
        </div>
        <div class="models-stats">
          <span id="models-count">0 models</span>
          <span id="models-new-count" class="new-badge" style="display:none"></span>
          <span id="models-deprecated-count" class="deprecated-badge" style="display:none"></span>
        </div>
      </div>
      <div class="models-table-wrap">
        <table id="models-table" class="models-table">
          <thead>
            <tr>
              <th data-col="type" class="th-sm">Type</th>
              <th data-col="id">Model</th>
              <th data-col="provider">Provider</th>
              <th data-col="context_window" class="th-num">Ctx</th>
              <th data-col="max_output" class="th-num">Out</th>
              <th data-col="dimensions" class="th-num">Dims</th>
              <th data-col="cost_input" class="th-num">$/in</th>
              <th data-col="cost_output" class="th-num">$/out</th>
              <th data-col="capabilities">Caps</th>
              <th data-col="status" class="th-sm">Status</th>
            </tr>
          </thead>
          <tbody id="models-tbody"></tbody>
        </table>
      </div>
      <div id="models-detail-panel" class="models-detail-panel" style="display:none">
        <button id="models-detail-close" class="detail-close-btn">×</button>
        <div id="models-detail-content"></div>
      </div>
    </div>

    <!-- Image Generation Section -->
    <div id="image-section" class="section" style="display:none">
      <h3>Image Generation</h3>
      <div class="image-controls-grid">
        <textarea id="image-prompt" placeholder="A futuristic city with glass towers and neon lights..."></textarea>
        <div class="image-controls-row">
          <div class="form-group form-group--inline">
            <label>Provider</label>
            <select id="image-provider"><option value="pollinations">pollinations</option><option value="tu">tu</option></select>
          </div>
          <div class="form-group form-group--inline">
            <label>Model</label>
            <select id="image-model"></select>
          </div>
          <div class="form-group form-group--inline form-group--sm">
            <label>Size</label>
            <select id="image-size">
              <option value="256x256">256</option><option value="512x512" selected>512</option>
              <option value="768x768">768</option><option value="1024x1024">1024</option>
              <option value="1024x1536">1024×1536</option><option value="1536x1024">1536×1024</option>
              <option value="1920x1080">1920×1080</option>
            </select>
          </div>
          <button id="generate-image" class="btn-primary">Generate</button>
          <button id="stop-image" class="btn-danger" style="display:none">Stop</button>
        </div>
      </div>
      <div id="image-status"></div>
      <div id="image-results"></div>
    </div>

    <!-- Audio Section -->
    <div id="audio-section" class="section" style="display:none">
      <div class="audio-box">
        <h3>Text-to-Speech</h3>
        <textarea id="tts-input" placeholder="Paste text here to convert to speech..." rows="3"></textarea>
        <div class="audio-controls-row">
          <div class="form-group form-group--inline">
            <label>Model</label>
            <select id="tts-model"><option value="">Loading...</option></select>
          </div>
          <div class="form-group form-group--inline">
            <label>Voice</label>
            <select id="tts-voice"></select>
          </div>
          <button id="tts-generate-btn" class="btn-primary">Generate Speech</button>
          <span id="tts-status"></span>
        </div>
        <div id="tts-result"></div>
      </div>
      <div class="audio-box">
        <h3>Speech-to-Text</h3>
        <div class="stt-upload-area">
          <input type="file" id="stt-file" accept="audio/*" style="display:none" />
          <button class="btn-secondary" onclick="document.getElementById('stt-file').click()">Choose Audio File</button>
          <div id="selected-audio-name" class="form-hint">No file selected</div>
        </div>
        <div class="audio-controls-row">
          <select id="stt-model" style="min-width:200px"><option value="">Loading...</option></select>
          <button id="stt-transcribe-btn" class="btn-primary">Transcribe</button>
          <span id="stt-status"></span>
        </div>
        <div id="stt-result" class="stt-result"></div>
      </div>
    </div>
  </div>

  <script src="/webdemo/config.js"></script>
  <script>
  (() => {
    "use strict";

    // ─── Store ───────────────────────────────────────────────────────
    const store = {
      providers: [],
      modelsByProvider: {},   // { provider: [{ id, type, context_window, cost, ... }] }
      allModels: [],          // flat list
      chatHistory: [],
      selectedProvider: null,
      selectedModel: null,
    };
    const HISTORY_MAX = 30;
    const HISTORY_CHARS = 24000;

    // ─── DOM refs ───────────────────────────────────────────────────
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    const providerSelect = $("#provider-select");
    const modelSearch = $("#model-search");
    const modelDropdown = $("#model-dropdown");
    const chatContainer = $("#chat-container");
    const messageInput = $("#message-input");
    const sendButton = $("#send-button");
    const stopButton = $("#stop-button");
    const modelInfoBar = $("#model-info-bar");
    const modelInfoBtn = $("#selected-model-info");
    let abortController = null;

    // ─── Search clear buttons ─────────────────────────────────────────
    $$(".search-clear").forEach(btn => {
      const input = $("#" + btn.dataset.target);
      const update = () => { btn.style.display = input.value ? "flex" : "none"; };
      input.addEventListener("input", update);
      btn.addEventListener("click", () => {
        input.value = "";
        input.focus();
        update();
        input.dispatchEvent(new Event("input"));
      });
    });

    // ─── Util ───────────────────────────────────────────────────────
    function escapeHtml(s) {
      const t = s == null ? "" : String(s);
      return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function sanitizeHtml(html) { return window.DOMPurify ? DOMPurify.sanitize(html) : escapeHtml(html); }
    function renderMd(content) { return sanitizeHtml(marked.parse(content || "")); }
    function formatCost(cost) {
      if (!cost || typeof cost !== "object") return "";
      const i = cost.input, o = cost.output;
      if (i == null && o == null) return "";
      return `$${i ?? "?"}/$${o ?? "?"}`;
    }
    function formatCtx(n) { return n ? `${(n/1000).toFixed(0)}k` : ""; }
    function typeIcon(type) {
      return { chat:"💬", embed:"📐", tts:"🔊", stt:"🎤", image:"🖼️" }[type] || "💬";
    }
    function typeColor(type) {
      return { chat:"#3b82f6", embed:"#8b5cf6", tts:"#f59e0b", stt:"#10b981", image:"#ec4899" }[type] || "#6b7280";
    }

    function getHeaders() {
      return { Authorization: `Bearer ${window.uniinferConfig.apiKey}`, "Content-Type": "application/json" };
    }
    async function apiFetch(path, opts = {}) {
      const { method="GET", headers={}, body, signal, allowHttp=false } = opts;
      const isAbs = path.startsWith("http");
      const url = isAbs ? path : `${window.uniinferConfig.apiBaseUrl}${path}`;
      const init = { method, headers: {...headers}, signal };
      if (body !== undefined) init.body = body;
      const resp = await fetch(url, init);
      if (!resp.ok && !allowHttp) {
        let detail;
        try { const d = await resp.json(); detail = d?.error?.message || d?.detail || JSON.stringify(d).substring(0,300); }
        catch { detail = resp.statusText || `HTTP ${resp.status}`; }
        const err = new Error(detail); err.status = resp.status; err.detail = detail; throw err;
      }
      return resp;
    }
    async function apiJson(path, opts) { return (await apiFetch(path, opts)).json(); }

    // ─── History ─────────────────────────────────────────────────────
    function saveHistory() { localStorage.setItem("uniinfer_chat_history", JSON.stringify(store.chatHistory)); }
    function loadHistory() {
      try {
        const h = JSON.parse(localStorage.getItem("uniinfer_chat_history") || "[]");
        store.chatHistory = Array.isArray(h) ? h : [];
      } catch { store.chatHistory = []; }
    }
    function truncateHistory() {
      let h = [...store.chatHistory];
      if (h.length > HISTORY_MAX) h = h.slice(h.length - HISTORY_MAX);
      let chars = h.reduce((a, m) => a + (typeof m.content === "string" ? m.content.length : 500), 0);
      while (h.length > 1 && chars > HISTORY_CHARS) { chars -= (typeof h[0].content === "string" ? h[0].content.length : 500); h.shift(); }
      store.chatHistory = h;
    }
    function pushHistory(msg) { store.chatHistory.push(msg); truncateHistory(); saveHistory(); }
    function updateStats() {
      const n = store.chatHistory.length;
      const chars = store.chatHistory.reduce((a,m) => a + (typeof m.content==="string"?m.content.length:500), 0);
      $("#stats-text").textContent = `${n} msgs • ~${Math.ceil(chars/4)} toks`;
      $("#chat-stats").style.display = n ? "flex" : "none";
    }
    function renderHistory() {
      chatContainer.innerHTML = "";
      store.chatHistory.forEach(m => {
        let text = m.content;
        if (Array.isArray(text)) { const t = text.find(i=>i.type==="text"); text = t ? t.text : "[Image]"; }
        addMsg(text, m.role, true);
      });
      updateStats();
    }

    // ─── Messages ───────────────────────────────────────────────────
    function addMsg(content, role, silent) {
      const div = document.createElement("div");
      div.className = `message ${role}-message`;
      if (role === "assistant") div.innerHTML = renderMd(content);
      else if (role === "error") div.innerHTML = `<div class="error-title">⚠️ Error</div><div class="error-detail">${escapeHtml(content)}</div>`;
      else div.textContent = content;
      if (!silent) chatContainer.appendChild(div);
      chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: "smooth" });
      return div;
    }

    // ─── Mode Switch ────────────────────────────────────────────────
    function setMode(mode) {
      $$(".mode-btn").forEach(b => b.classList.remove("active"));
      $$(".section").forEach(s => s.style.display = "none");
      if (mode === "chat") { $("#mode-chat").classList.add("active"); $("#chat-section").style.display = "flex"; }
      else if (mode === "models") { $("#mode-models").classList.add("active"); $("#models-section").style.display = "block"; loadModelsBrowser(); }
      else if (mode === "image") { $("#mode-image").classList.add("active"); $("#image-section").style.display = "block"; }
      else if (mode === "audio") { $("#mode-audio").classList.add("active"); $("#audio-section").style.display = "block"; loadAudioModels(); }
    }
    $("#mode-chat").onclick = () => setMode("chat");
    $("#mode-models").onclick = () => setMode("models");
    $("#mode-image").onclick = () => setMode("image");
    $("#mode-audio").onclick = () => setMode("audio");

    // ─── Load Providers ──────────────────────────────────────────────
    async function loadProviders() {
      try {
        const { data: providers } = await apiJson("/v1/providers", { headers: getHeaders() });
        store.providers = providers;
        providerSelect.innerHTML = '<option value="" disabled selected>Select provider</option>';
        providers.forEach(p => { const o = document.createElement("option"); o.value = p; o.textContent = p; providerSelect.appendChild(o); });
        providerSelect.disabled = false;
        if (providers.length) { providerSelect.value = providers[0]; await loadModelsForProvider(providers[0]); }
      } catch (e) {
        addMsg(`Connection error: ${e.detail || e.message}`, "error");
      }
    }

    // ─── Load Models for Provider ───────────────────────────────────
    async function loadModelsForProvider(provider) {
      try {
        const { data } = await apiJson(`/v1/models/${provider}`, { headers: getHeaders() });
        store.modelsByProvider[provider] = data;
        store.selectedProvider = provider;
        updateModelDropdown();
        if (data.length) selectModel(data[0].id);
        else { modelSearch.value = ""; hideDropdown(); }
      } catch (e) {
        console.error("Failed to load models for", provider, e);
      }
    }

    // ─── Model Search Dropdown ──────────────────────────────────────
    function updateModelDropdown(filter = "") {
      const models = store.modelsByProvider[store.selectedProvider] || [];
      const f = filter.toLowerCase();
      const filtered = f ? models.filter(m => m.id.toLowerCase().includes(f)) : models;
      modelDropdown.innerHTML = "";
      if (!filtered.length) { modelDropdown.innerHTML = '<div class="dropdown-empty">No models found</div>'; }
      filtered.forEach(m => {
        const div = document.createElement("div");
        div.className = "dropdown-item" + (m.id === store.selectedModel ? " active" : "");
        const type = m.type || "chat";
        div.innerHTML = `<span class="di-type" style="color:${typeColor(type)}">${typeIcon(type)}</span>
          <span class="di-id">${escapeHtml(m.id)}</span>
          <span class="di-meta">${formatCtx(m.context_window)}${m.cost ? " · " + formatCost(m.cost) : ""}</span>`;
        div.onclick = () => { selectModel(m.id); hideDropdown(); modelSearch.blur(); };
        modelDropdown.appendChild(div);
      });
      modelDropdown.style.display = filtered.length ? "block" : "block";
    }
    function hideDropdown() { modelDropdown.style.display = "none"; }
    function showDropdown() { updateModelDropdown(modelSearch.value); }

    function selectModel(id) {
      store.selectedModel = id;
      modelSearch.value = id;
      updateModelInfoBar();
    }

    function updateModelInfoBar() {
      const models = store.modelsByProvider[store.selectedProvider] || [];
      const m = models.find(x => x.id === store.selectedModel);
      if (!m) { modelInfoBar.style.display = "none"; modelInfoBtn.style.display = "none"; return; }
      modelInfoBar.style.display = "flex";
      modelInfoBtn.style.display = "flex";
      const type = m.type || "chat";
      $("#model-info-type").textContent = typeIcon(type) + " " + type;
      $("#model-info-type").style.color = typeColor(type);
      $("#model-info-ctx").textContent = m.context_window ? `ctx ${formatCtx(m.context_window)}` : "";
      $("#model-info-cost").textContent = m.cost ? formatCost(m.cost) : "";
      const caps = [];
      if (m.capabilities) { if (m.capabilities.reasoning) caps.push("reasoning"); if (m.capabilities.vision) caps.push("vision"); if (m.capabilities.tool_call) caps.push("tools"); }
      if (m.dimensions) caps.push(`${m.dimensions}d`);
      $("#model-info-caps").textContent = caps.join(" · ");
      const status = m.status || m.deprecation_date;
      $("#model-info-status").textContent = status === "deprecated" ? "⚠ deprecated" : m.deprecation_date ? `deprecates ${m.deprecation_date}` : "";
      $("#model-info-status").style.color = "#ef4444";
    }

    modelSearch.addEventListener("focus", showDropdown);
    modelSearch.addEventListener("input", () => updateModelDropdown(modelSearch.value));
    modelSearch.addEventListener("blur", () => setTimeout(hideDropdown, 150));
    modelSearch.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const first = modelDropdown.querySelector(".dropdown-item");
        if (first) { first.click(); e.preventDefault(); }
      } else if (e.key === "Escape") { hideDropdown(); modelSearch.blur(); }
      else if (e.key === "Tab") { e.preventDefault(); const items = modelDropdown.querySelectorAll(".dropdown-item"); if (items.length) items[0].click(); }
    });
    providerSelect.addEventListener("change", () => loadModelsForProvider(providerSelect.value));
    modelInfoBtn.addEventListener("click", () => {
      if (store.selectedModel && store.selectedProvider) {
        showModelDetail(store.selectedProvider, store.selectedModel);
      }
    });

    // ─── Send Message ───────────────────────────────────────────────
    async function sendMessage(text) {
      const provider = store.selectedProvider, model = store.selectedModel;
      if (!provider || !model) { addMsg("Select provider and model first", "error"); return; }
      let content = text;
      if ($("#image-preview-area").style.display !== "none" && $("#image-preview-img").src) {
        content = [{ type:"text", text }, { type:"image_url", image_url:{ url:$("#image-preview-img").src } }];
        $("#image-preview-area").style.display = "none";
      }
      addMsg(text, "user");
      pushHistory({ role:"user", content });
      messageInput.value = ""; messageInput.style.height = "auto";
      sendButton.style.display = "none"; stopButton.style.display = "flex";
      const assistantDiv = addMsg("...", "assistant");
      abortController = new AbortController();
      let fullResponse = "", fullThinking = "";
      try {
        const resp = await apiFetch("/v1/chat/completions", {
          method: "POST", headers: getHeaders(), signal: abortController.signal,
          body: JSON.stringify({ model:`${provider}@${model}`, messages: store.chatHistory, stream:true, max_tokens: window.uniinferConfig.maxTokens || 4000 }),
        });
        if (!resp.body) throw new Error("Empty response");
        const reader = resp.body.getReader(), decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          for (const line of decoder.decode(value).split("\n").filter(l => l.startsWith("data: "))) {
            const str = line.slice(6);
            if (str === "[DONE]") break;
            try {
              const d = JSON.parse(str);
              if (d.error) { assistantDiv.remove(); addMsg(d.error.message || JSON.stringify(d.error), "error"); return; }
              const delta = d.choices?.[0]?.delta || {};
              if (delta.content) fullResponse += delta.content;
              if (delta.thinking || delta.reasoning_content) fullThinking += (delta.thinking || delta.reasoning_content);
              let html = "";
              if (fullThinking) html += `<details class="thinking-details"><summary class="thinking-badge">💭 Thinking</summary><div class="thinking-content">${escapeHtml(fullThinking)}</div></details>`;
              if (fullResponse) html += renderMd(fullResponse);
              assistantDiv.innerHTML = html || "";
              chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch {}
          }
        }
        if (fullResponse) pushHistory({ role:"assistant", content:fullResponse });
        updateStats();
      } catch (e) {
        if (e.name !== "AbortError") { assistantDiv.remove(); addMsg(e.detail || e.message, "error"); }
      } finally { sendButton.style.display = "flex"; stopButton.style.display = "none"; abortController = null; }
    }

    sendButton.addEventListener("click", () => sendMessage(messageInput.value.trim()));
    messageInput.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(messageInput.value.trim()); } });
    messageInput.addEventListener("input", () => { messageInput.style.height = "auto"; messageInput.style.height = messageInput.scrollHeight + "px"; });
    stopButton.addEventListener("click", () => abortController?.abort());

    // Image upload
    $("#upload-image-btn").addEventListener("click", () => $("#chat-file-input").click());
    $("#chat-file-input").addEventListener("change", e => {
      const file = e.target.files[0];
      if (file) { const r = new FileReader(); r.onload = ev => { $("#image-preview-img").src = ev.target.result; $("#image-preview-area").style.display = "block"; }; r.readAsDataURL(file); }
    });
    $("#remove-image-btn").addEventListener("click", () => { $("#image-preview-area").style.display = "none"; $("#chat-file-input").value = ""; });

    // Clear chat
    $("#clear-chat-btn").addEventListener("click", () => {
      store.chatHistory = []; saveHistory(); chatContainer.innerHTML = "";
      addMsg("Select a provider and model to start chatting.", "system"); updateStats();
    });

    // ─── Models Browser (Table) ─────────────────────────────────────
    let modelsBrowserLoaded = false;
    let modelsSortCol = "id", modelsSortDir = 1; // 1=asc, -1=desc
    let modelsFilter = "all", modelsSearchText = "", modelsProviderFilter = "";

    async function loadModelsBrowser() {
      if (modelsBrowserLoaded) return;
      modelsBrowserLoaded = true;
      const { data } = await apiJson("/v1/models", { headers: getHeaders() });
      store.allModels = data;
      await loadOverrides();
      const provs = [...new Set(data.map(m => m.provider || ""))].filter(Boolean).sort();
      const sel = $("#models-browser-provider");
      sel.innerHTML = '<option value="">All providers</option>';
      provs.forEach(p => { const o = document.createElement("option"); o.value = p; o.textContent = p; sel.appendChild(o); });
      renderModelsTable();
      try {
        const newD = await apiJson("/v1/models/new?days=7", { headers: getHeaders(), allowHttp: true });
        if (newD.total > 0) { $("#models-new-count").textContent = `${newD.total} new`; $("#models-new-count").style.display = "inline"; }
      } catch {}
      try {
        const depD = await apiJson("/v1/models/deprecated", { headers: getHeaders(), allowHttp: true });
        if (depD.total > 0) { $("#models-deprecated-count").textContent = `${depD.total} deprecated`; $("#models-deprecated-count").style.display = "inline"; }
      } catch {}
    }

    function capBadges(m) {
      const caps = m.capabilities || {};
      const badges = [];
      if (caps.reasoning) badges.push('<span class="cb cb-reasoning">R</span>');
      if (caps.vision) badges.push('<span class="cb cb-vision">V</span>');
      if (caps.tool_call) badges.push('<span class="cb cb-tools">T</span>');
      if (caps.code_exec) badges.push('<span class="cb cb-code">C</span>');
      if (caps.thinking) badges.push('<span class="cb cb-thinking">💭</span>');
      if (caps.audio) badges.push('<span class="cb cb-audio">🔊</span>');
      if (caps.ocr) badges.push('<span class="cb cb-ocr">OCR</span>');
      if (caps.pdf) badges.push('<span class="cb cb-pdf">PDF</span>');
      return badges.join("") || "—";
    }

    function renderModelsTable() {
      let models = store.allModels || [];
      if (modelsProviderFilter) models = models.filter(m => (m.provider || "") === modelsProviderFilter);
      if (modelsFilter !== "all") models = models.filter(m => (m.type || "chat") === modelsFilter);
      if (modelsSearchText) { const f = modelsSearchText.toLowerCase(); models = models.filter(m => m.id.toLowerCase().includes(f) || (m.provider||"").toLowerCase().includes(f)); }
      // Sort
      models.sort((a, b) => {
        let va, vb;
        const col = modelsSortCol;
        if (col === "type") { va = a.type || "chat"; vb = b.type || "chat"; }
        else if (col === "id") { va = a.id || ""; vb = b.id || ""; }
        else if (col === "provider") { va = a.provider || ""; vb = b.provider || ""; }
        else if (col === "context_window" || col === "max_output" || col === "dimensions") { va = a[col] || 0; vb = b[col] || 0; }
        else if (col === "cost_input") { va = (a.cost?.input) || 0; vb = (b.cost?.input) || 0; }
        else if (col === "cost_output") { va = (a.cost?.output) || 0; vb = (b.cost?.output) || 0; }
        else if (col === "status") { va = a.status || ""; vb = b.status || ""; }
        else if (col === "capabilities") { va = Object.keys(a.capabilities || {}).length; vb = Object.keys(b.capabilities || {}).length; }
        else { va = a[col]; vb = b[col]; }
        if (typeof va === "string") return va.localeCompare(vb) * modelsSortDir;
        return ((va || 0) - (vb || 0)) * modelsSortDir;
      });
      $("#models-count").textContent = `${models.length} models`;
      const tbody = $("#models-tbody");
      tbody.innerHTML = "";
      if (!models.length) { tbody.innerHTML = '<tr><td colspan="10" class="models-empty">No models match your filter.</td></tr>'; return; }
      // Render in chunks to keep UI responsive
      const frag = document.createDocumentFragment();
      for (const m of models) {
        const type = m.type || "chat";
        const tr = document.createElement("tr");
        tr.className = m.status === "deprecated" ? "tr-deprecated" : "";
        tr.dataset.provider = m.provider || "";
        tr.dataset.id = m.id;
        tr.innerHTML =
          `<td class="td-type"><span style="color:${typeColor(type)}">${typeIcon(type)}</span> <span class="td-type-label">${type}</span></td>` +
          `<td class="td-id" title="${escapeHtml(m.id)}">${escapeHtml(m.id)}</td>` +
          `<td class="td-provider">${escapeHtml(m.provider || "")}</td>` +
          `<td class="td-num">${m.context_window ? m.context_window.toLocaleString() : ""}</td>` +
          `<td class="td-num">${m.max_output ? m.max_output.toLocaleString() : ""}</td>` +
          `<td class="td-num td-dims">${m.dimensions ? m.dimensions.toLocaleString() : ""}</td>` +
          `<td class="td-num">${m.cost?.input != null ? m.cost.input : ""}</td>` +
          `<td class="td-num">${m.cost?.output != null ? m.cost.output : ""}</td>` +
          `<td class="td-caps">${capBadges(m)}</td>` +
          `<td class="td-status">${m.status === "deprecated" ? '<span class="status-dep">dep</span>' : m.first_seen ? `<span class="status-new" title="First seen ${m.first_seen}">new</span>` : ""}</td>`;
        tr.addEventListener("click", () => showModelDetail(m.provider || "", m.id));
        frag.appendChild(tr);
      }
      tbody.appendChild(frag);
      // Update sort indicators
      $$("#models-table th").forEach(th => {
        const col = th.dataset.col;
        const arrow = th.querySelector(".sort-arrow");
        if (arrow) arrow.remove();
        if (col === modelsSortCol) {
          const span = document.createElement("span");
          span.className = "sort-arrow";
          span.textContent = modelsSortDir === 1 ? " ▲" : " ▼";
          th.appendChild(span);
        }
      });
    }

    // Column sort
    $$("#models-table th").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.dataset.col;
        if (modelsSortCol === col) modelsSortDir *= -1;
        else { modelsSortCol = col; modelsSortDir = 1; }
        renderModelsTable();
      });
      th.style.cursor = "pointer";
    });

    $$(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        $$(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        modelsFilter = btn.dataset.filter;
        renderModelsTable();
      });
    });
    $("#models-browser-search").addEventListener("input", e => { modelsSearchText = e.target.value; renderModelsTable(); });
    $("#models-browser-provider").addEventListener("change", e => { modelsProviderFilter = e.target.value; renderModelsTable(); });

    // Track current overrides loaded from server
    let serverOverrides = {};

    async function loadOverrides() {
      try {
        const d = await apiJson("/v1/models/overrides", { headers: getHeaders() });
        serverOverrides = d.models || {};
      } catch { serverOverrides = {}; }
    }

    function showModelDetail(provider, id) {
      const models = store.allModels || [];
      const m = models.find(x => x.id === id && (x.provider || "") === provider) || models.find(x => x.id === id);
      if (!m) return;
      const panel = $("#models-detail-panel");
      const type = m.type || "chat";
      const caps = m.capabilities || {};
      const capList = Object.entries(caps).filter(([,v])=>v).map(([k])=>k);
      const mod = m.modalities || {};
      const ov = serverOverrides[id] || {};
      $("#models-detail-content").innerHTML = `
        <div class="detail-header">
          <span class="detail-type" style="color:${typeColor(type)}">${typeIcon(type)} ${type}</span>
          <span class="detail-id">${escapeHtml(m.id)}</span>
          ${m.provider ? `<span class="detail-provider">${escapeHtml(m.provider)}</span>` : ""}
        </div>
        <div class="detail-grid">
          <div class="dg-item"><span class="dg-label">Name</span><input class="dg-input" data-field="name" value="${escapeHtml(m.name || ov.name || m.id)}" placeholder="${escapeHtml(m.id)}" /></div>
          <div class="dg-item"><span class="dg-label">Type</span><select class="dg-select" data-field="type">
            ${["chat","embed","tts","stt","image"].map(t=>`<option value="${t}"${type===t?" selected":""}>${t}</option>`).join("")}
          </select></div>
          <div class="dg-item"><span class="dg-label">Context</span><input class="dg-input" type="number" data-field="context_window" value="${m.context_window||ov.context_window||""}" placeholder="e.g. 128000" /></div>
          <div class="dg-item"><span class="dg-label">Max Output</span><input class="dg-input" type="number" data-field="max_output" value="${m.max_output||ov.max_output||""}" placeholder="e.g. 8192" /></div>
          <div class="dg-item"><span class="dg-label">Dimensions</span><input class="dg-input" type="number" data-field="dimensions" value="${m.dimensions||ov.dimensions||""}" placeholder="e.g. 4096" /></div>
          <div class="dg-item"><span class="dg-label">Cost in ($/M)</span><input class="dg-input" type="number" step="0.01" data-field="cost_input" value="${m.cost?.input||ov.cost?.input||""}" placeholder="0" /></div>
          <div class="dg-item"><span class="dg-label">Cost out ($/M)</span><input class="dg-input" type="number" step="0.01" data-field="cost_output" value="${m.cost?.output||ov.cost?.output||""}" placeholder="0" /></div>
          <div class="dg-item"><span class="dg-label">Owner</span><span class="dg-value">${escapeHtml(m.owned_by || "—")}</span></div>
          <div class="dg-item"><span class="dg-label">First Seen</span><span class="dg-value">${m.first_seen || "—"}</span></div>
          <div class="dg-item"><span class="dg-label">Release</span><span class="dg-value">${m.release_date || "—"}</span></div>
          <div class="dg-item"><span class="dg-label">Knowledge</span><span class="dg-value">${m.knowledge_cutoff || "—"}</span></div>
          ${m.deprecation_date ? `<div class="dg-item"><span class="dg-label">Deprecation</span><span class="dg-value" style="color:#ef4444">${m.deprecation_date}</span></div>` : ""}
          ${m.deprecation_replacement ? `<div class="dg-item"><span class="dg-label">Replacement</span><span class="dg-value">${escapeHtml(m.deprecation_replacement)}</span></div>` : ""}
          ${m.status ? `<div class="dg-item"><span class="dg-label">Status</span><span class="dg-value">${m.status}</span></div>` : ""}
        </div>
        ${capList.length ? `<div class="detail-section"><h4>Capabilities</h4><div class="detail-tags">${capList.map(c=>`<span class="tag">${c}</span>`).join("")}</div></div>` : ""}
        ${mod.input || mod.output ? `<div class="detail-section"><h4>Modalities</h4><div class="detail-tags">${[...(mod.input||[]), ...(mod.output||[])].map(m=>`<span class="tag">${m}</span>`).join("")}</div></div>` : ""}
        <div class="detail-actions">
          <button class="btn-primary" id="save-override-btn">Save</button>
          ${ov._updated ? `<span class="override-timestamp">last saved ${ov._updated}</span>` : ""}
        </div>
      `;
      panel.style.display = "flex";
      // Wire save button
      $("#save-override-btn").addEventListener("click", () => saveOverride(id));
    }

    async function saveOverride(id) {
      const fields = {};
      $("#models-detail-content [data-field]").forEach(el => {
        const key = el.dataset.field;
        let val = el.value.trim();
        if (!val) return;
        if (el.type === "number") val = parseFloat(val);
        if (key === "cost_input") { fields["cost"] = fields["cost"] || {}; fields["cost"]["input"] = val; return; }
        if (key === "cost_output") { fields["cost"] = fields["cost"] || {}; fields["cost"]["output"] = val; return; }
        fields[key] = val;
      });
      if (!Object.keys(fields).length) return;
      try {
        await apiJson(`/v1/models/overrides/${encodeURIComponent(id)}`, {
          method: "PUT", headers: getHeaders(),
          body: JSON.stringify(fields),
        });
        serverOverrides[id] = { ...serverOverrides[id], ...fields, _updated: new Date().toISOString().slice(0,19).replace("T"," ") };
        // Refresh the models list to reflect changes
        modelsBrowserLoaded = false;
        loadOverrides();
        loadModelsBrowser();
        // Re-open detail with fresh data
        showModelDetail(store.allModels.find(x=>x.id===id)?.provider || "", id);
      } catch (e) {
        alert("Save failed: " + (e.detail || e.message));
      }
    }

    $("#models-detail-close").addEventListener("click", () => { $("#models-detail-panel").style.display = "none"; });

    // ─── Image Generation ───────────────────────────────────────────
    async function updateImageModels() {
      try {
        const json = await apiJson(`/v1/image/models/${$("#image-provider").value}`, { headers: getHeaders() });
        const sel = $("#image-model"); sel.innerHTML = "";
        (json.data || []).forEach(m => { const o = document.createElement("option"); o.value = m.id; o.textContent = m.id; sel.appendChild(o); });
      } catch {}
    }
    $("#image-provider").addEventListener("change", updateImageModels);

    $("#generate-image").addEventListener("click", async () => {
      const prompt = $("#image-prompt").value.trim(); if (!prompt) return;
      const btn = $("#generate-image"); btn.disabled = true;
      const status = $("#image-status"); status.innerHTML = '<span class="spinner"></span> Generating...';
      let ok = false;
      try {
        const resp = await apiFetch("/v1/images/generations", {
          method:"POST", headers:getHeaders(),
          body: JSON.stringify({ model:`${$("#image-provider").value}@${$("#image-model").value}`, prompt, size:$("#image-size").value }),
        });
        const data = await resp.json();
        const item = data.data?.[0];
        if (item) {
          let src = item.url || "";
          if (item.b64_json) { const pfx = item.b64_json.startsWith("/9j/") ? "data:image/jpeg;base64," : "data:image/png;base64,"; src = pfx + item.b64_json; }
          if (src) {
            const card = document.createElement("div"); card.className = "image-card";
            card.innerHTML = `<img src="${escapeHtml(src)}" /><div class="image-card-label">${escapeHtml(prompt)}</div>`;
            card.querySelector("img").addEventListener("click", () => window.open(src, "_blank"));
            $("#image-results").prepend(card); ok = true;
          }
        }
        if (!ok) status.innerHTML = '<div class="error-status"><span>⚠️</span> No image generated</div>';
      } catch (e) { status.innerHTML = `<div class="error-status"><span>⚠️</span> ${escapeHtml(e.detail || e.message)}</div>`; }
      finally { btn.disabled = false; if (ok) status.innerHTML = ""; }
    });

    // ─── Audio ───────────────────────────────────────────────────────
    async function loadAudioModels() {
      try {
        // Load all models and filter for TTS/STT types
        const { data } = await apiJson("/v1/models", { headers: getHeaders() });
        const ttsModels = data.filter(m => m.type === "tts" || (m.id && (m.id.toLowerCase().includes("kokoro") || m.id.toLowerCase().includes("piper"))));
        const sttModels = data.filter(m => m.type === "stt" || (m.id && (m.id.toLowerCase().includes("whisper") || m.id.toLowerCase().includes("stt"))));
        const ttsSel = $("#tts-model"); ttsSel.innerHTML = "";
        if (ttsModels.length) ttsModels.forEach(m => { const o = document.createElement("option"); o.value = `${m.provider}@${m.id}`; o.textContent = `${m.provider}/${m.id}`; ttsSel.appendChild(o); });
        else { const o = document.createElement("option"); o.value = "tu@kokoro"; o.textContent = "tu/kokoro"; ttsSel.appendChild(o); }
        const sttSel = $("#stt-model"); sttSel.innerHTML = "";
        if (sttModels.length) sttModels.forEach(m => { const o = document.createElement("option"); o.value = `${m.provider}@${m.id}`; o.textContent = `${m.provider}/${m.id}`; sttSel.appendChild(o); });
        else { const o = document.createElement("option"); o.value = "tu@whisper-large"; o.textContent = "tu/whisper-large"; sttSel.appendChild(o); }
        updateVoices();
      } catch {}
    }
    function updateVoices() {
      const v = $("#tts-model").value;
      const voices = v.includes("piper") ? ["thorsten"] : v.includes("kokoro") ? ["af_alloy","af_heart","af_bella","af_nicole"] : ["alloy","echo","fable","onyx","nova","shimmer"];
      $("#tts-voice").innerHTML = voices.map(x => `<option value="${x}">${x}</option>`).join("");
    }
    $("#tts-model").addEventListener("change", updateVoices);

    $("#tts-generate-btn").addEventListener("click", async () => {
      const text = $("#tts-input").value.trim(); if (!text) return;
      const btn = $("#tts-generate-btn"); btn.disabled = true;
      const status = $("#tts-status"); status.innerHTML = '<span class="spinner"></span> Creating...';
      let ok = false;
      try {
        const resp = await apiFetch("/v1/audio/speech", { method:"POST", headers:getHeaders(),
          body: JSON.stringify({ model:$("#tts-model").value, input:text, voice:$("#tts-voice").value }) });
        const blob = await resp.blob();
        const audio = document.createElement("audio"); audio.controls = true; audio.src = URL.createObjectURL(blob); audio.style.width = "100%";
        $("#tts-result").prepend(audio); ok = true;
      } catch (e) { status.innerHTML = `<span style="color:#ef4444">${escapeHtml(e.detail || e.message)}</span>`; }
      finally { btn.disabled = false; if (ok) status.innerHTML = ""; }
    });

    $("#stt-file").addEventListener("change", () => { $("#selected-audio-name").textContent = $("#stt-file").files[0]?.name || "No file selected"; });
    $("#stt-transcribe-btn").addEventListener("click", async () => {
      const file = $("#stt-file").files[0]; if (!file) return;
      const btn = $("#stt-transcribe-btn"); btn.disabled = true;
      const status = $("#stt-status"); status.innerHTML = '<span class="spinner"></span> Transcribing...';
      let ok = false;
      try {
        const fd = new FormData(); fd.append("file", file); fd.append("model", $("#stt-model").value);
        const resp = await apiFetch("/v1/audio/transcriptions", { method:"POST", headers:{ Authorization:`Bearer ${window.uniinferConfig.apiKey}` }, body:fd });
        const data = await resp.json();
        $("#stt-result").innerHTML = `<div class="stt-label">Transcription:</div>${escapeHtml(data.text || "No text found")}`;
        ok = true;
      } catch (e) { status.innerHTML = `<span style="color:#ef4444">${escapeHtml(e.detail || e.message)}</span>`; }
      finally { btn.disabled = false; if (ok) status.innerHTML = ""; }
    });

    // ─── Settings ────────────────────────────────────────────────────
    function setCookie(n,v,h) { let e=""; if(h){const d=new Date();d.setTime(d.getTime()+h*36e5);e=";expires="+d.toUTCString();}document.cookie=n+"="+(v||"")+e+";path=/"; }
    function getCookie(n) { const eq=n+"="; for(let c of document.cookie.split(";")){c=c.trim();if(c.startsWith(eq))return c.substring(eq.length);} return null; }

    function openSettings() {
      $("#settings-api-base-url").value = window.uniinferConfig.apiBaseUrl;
      $("#settings-api-key").value = window.uniinferConfig.apiKey;
      $("#settings-remember-key").checked = localStorage.getItem("uniinfer_remember_api_key") === "1";
      $("#settings-max-tokens").value = window.uniinferConfig.maxTokens || 4000;
      $("#settings-modal").style.display = "flex";
    }
    function closeSettings() { $("#settings-modal").style.display = "none"; }

    $("#settings-button").addEventListener("click", openSettings);
    $("#settings-cancel").addEventListener("click", closeSettings);
    $("#settings-modal").addEventListener("click", e => { if (e.target === $("#settings-modal")) closeSettings(); });

    $("#settings-save").addEventListener("click", () => {
      window.uniinferConfig.apiBaseUrl = $("#settings-api-base-url").value.trim();
      const key = $("#settings-api-key").value.trim();
      window.uniinferConfig.apiKey = key;
      const remember = $("#settings-remember-key").checked;
      localStorage.setItem("uniinfer_remember_api_key", remember ? "1" : "0");
      if (remember) { localStorage.setItem("uniinfer_api_key", key); setCookie("uniinfer_api_key", key, 48); }
      else { localStorage.removeItem("uniinfer_api_key"); setCookie("uniinfer_api_key", "", -1); }
      window.uniinferConfig.maxTokens = parseInt($("#settings-max-tokens").value) || 4000;
      closeSettings(); loadProviders(); loadAudioModels();
    });

    async function refreshModels() {
      const btn = $("#update-models-btn"); btn.disabled = true;
      $("#update-models-status").textContent = "Refreshing...";
      try {
        modelsBrowserLoaded = false;
        await loadProviders();
        if (store.selectedProvider) await loadModelsForProvider(store.selectedProvider);
        loadAudioModels();
        const now = Date.now();
        localStorage.setItem("uniinfer_models_last_refreshed", String(now));
        $("#update-models-status").textContent = `Last refreshed: ${new Date(now).toLocaleString()}`;
      } catch (e) { $("#update-models-status").textContent = `Failed: ${e.message}`; }
      finally { btn.disabled = false; }
    }
    $("#update-models-btn").addEventListener("click", refreshModels);

    // Restore saved key
    if (localStorage.getItem("uniinfer_remember_api_key") === "1") {
      const k = localStorage.getItem("uniinfer_api_key") || getCookie("uniinfer_api_key");
      if (k) window.uniinferConfig.apiKey = k.trim();
    }
    const lastRefresh = localStorage.getItem("uniinfer_models_last_refreshed");
    if (lastRefresh) $("#update-models-status").textContent = `Last refreshed: ${new Date(parseInt(lastRefresh)).toLocaleString()}`;

    // ─── Init ───────────────────────────────────────────────────────
    async function init() {
      try { const { version } = await apiJson("/v1/system/info"); $("#app-version").textContent = `v${version||"?"}`; } catch { $("#app-version").textContent = "v?"; }
      loadHistory(); renderHistory();
      loadProviders();
      loadAudioModels();
      updateImageModels();
      setMode("chat");
    }
    init();
  })();
  </script>
</body>
</html>
