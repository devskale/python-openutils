[project]
name = "credgoo"
version = "0.1.11"
description = "A package for securely retrieving API keys from Google Sheets"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [
    {name = "Han Woo", email = "dev@skale.dev"}
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests",
]

[project.urls]
Homepage = "https://github.com/devskale/python-openutils/tree/master/packages/credgoo"

[project.scripts]
credgoo = "credgoo.credgoo:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"